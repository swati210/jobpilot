<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JobPilot — Find Data & AI Jobs</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0d1321; --panel:#141b2d; --ink:#eef1f8; --ink-dim:#8b93ab;
    --accent:#4f8cff; --accent-deep:#2f6fe0; --mint:#3ecf8e; --line:#232b41;
    --bot-bubble:#1b2338; --user-bubble:#4f8cff;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    background:var(--bg); font-family:'Inter', sans-serif; color:var(--ink);
    min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px;
  }
  .app{
    width:100%; max-width:520px; height:86vh; max-height:720px;
    background:var(--panel); border-radius:20px; overflow:hidden;
    display:flex; flex-direction:column;
    box-shadow:0 40px 90px -30px rgba(0,0,0,0.6);
    border:1px solid var(--line);
  }
  .head{
    padding:20px 24px; border-bottom:1px solid var(--line);
    display:flex; align-items:center; gap:12px;
    background:linear-gradient(135deg, #16203a, #101728);
  }
  .avatar{
    width:40px; height:40px; border-radius:12px; background:var(--accent);
    display:flex; align-items:center; justify-content:center; font-size:18px;
  }
  .head h1{font-family:'Space Grotesk', sans-serif; font-size:16px;}
  .head p{font-size:11.5px; color:var(--ink-dim);}

  .chat-area{flex:1; overflow-y:auto; padding:20px 22px; display:flex; flex-direction:column; gap:14px;}
  .msg{max-width:85%; padding:12px 16px; border-radius:14px; font-size:14px; line-height:1.55; animation:rise .25s ease;}
  @keyframes rise{from{opacity:0; transform:translateY(6px);} to{opacity:1; transform:translateY(0);}}
  .msg.bot{background:var(--bot-bubble); align-self:flex-start; border-bottom-left-radius:4px;}
  .msg.user{background:var(--user-bubble); color:#fff; align-self:flex-end; border-bottom-right-radius:4px;}
  .chat-area::-webkit-scrollbar{width:6px;}
  .chat-area::-webkit-scrollbar-thumb{background:#2a3350; border-radius:3px;}

  .role-chips, .loc-chips{display:flex; flex-wrap:wrap; gap:8px; margin-top:4px;}
  .chip{
    font-size:12.5px; padding:8px 13px; border-radius:20px; border:1px solid var(--accent);
    color:var(--accent); background:transparent; cursor:pointer; transition:all .15s;
    font-family:'Inter', sans-serif;
  }
  .chip:hover, .chip.selected{background:var(--accent); color:#fff;}

  .results{display:flex; flex-direction:column; gap:10px; margin-top:6px;}
  .result-card{
    background:#0f1729; border:1px solid var(--line); border-radius:12px; padding:14px 16px;
    display:flex; align-items:center; justify-content:space-between; gap:12px;
  }
  .result-card .rc-left{display:flex; align-items:center; gap:12px;}
  .rc-logo{
    width:36px; height:36px; border-radius:8px; display:flex; align-items:center; justify-content:center;
    font-size:15px; font-weight:700; flex-shrink:0;
  }
  .rc-name{font-size:14px; font-weight:600;}
  .rc-sub{font-size:11.5px; color:var(--ink-dim);}
  .rc-link{
    font-size:12.5px; padding:8px 14px; border-radius:8px; background:var(--accent); color:#fff;
    text-decoration:none; font-weight:600; white-space:nowrap;
  }
  .rc-link:hover{background:var(--accent-deep);}

  .input-row{display:flex; gap:10px; padding:16px 18px; border-top:1px solid var(--line);}
  .input-row input{
    flex:1; border:1px solid var(--line); border-radius:24px; padding:12px 16px;
    font-size:14px; outline:none; background:#0f1729; color:var(--ink); font-family:'Inter', sans-serif;
  }
  .input-row input:focus{border-color:var(--accent);}
  .send-btn{
    width:44px; height:44px; border-radius:50%; border:none; background:var(--accent); color:#fff;
    font-size:16px; cursor:pointer;
  }
  .send-btn:hover{background:var(--accent-deep);}

  .typing{display:flex; gap:4px;}
  .typing span{width:6px; height:6px; border-radius:50%; background:var(--accent); opacity:.5; animation:blink 1.2s infinite;}
  .typing span:nth-child(2){animation-delay:.2s;}
  .typing span:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{opacity:.3;} 40%{opacity:1;}}

  @media (max-width:560px){
    .app{height:100vh; border-radius:0; max-height:none;}
    body{padding:0;}
  }
</style>
</head>
<body>

<div class="app">
  <div class="head">
    <div class="avatar">🛰️</div>
    <div>
      <h1>JobPilot</h1>
      <p>Finds live Data & AI job links for you</p>
    </div>
  </div>

  <div class="chat-area" id="chatArea">
    <div class="msg bot">Hi! I'm JobPilot 🛰️ Tell me the role you're looking for, and I'll pull direct search links from LinkedIn, Naukri, Indeed & Glassdoor. Pick a role below or type your own:</div>
  </div>

  <div class="input-row">
    <input type="text" id="userInput" placeholder="e.g. Data Scientist in Bangalore..." autocomplete="off">
    <button class="send-btn" id="sendBtn">➤</button>
  </div>
</div>

<script>
  const chatArea = document.getElementById('chatArea');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  const roles = ["Data Scientist", "Data Analyst", "Machine Learning Engineer", "AI Engineer", "LLM Engineer", "NLP Engineer"];
  const locations = ["Remote", "India", "Bangalore", "Delhi NCR", "Hyderabad", "Any location"];

  let pendingRole = null;

  function addMessage(html, sender){
    const div = document.createElement('div');
    div.className = 'msg ' + sender;
    div.innerHTML = html;
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
    return div;
  }

  function showTyping(){
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'typingIndicator';
    div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }
  function removeTyping(){
    const t = document.getElementById('typingIndicator');
    if(t) t.remove();
  }

  function showRoleChips(){
    const chipsHtml = '<div>Popular roles:</div><div class="role-chips">' +
      roles.map(r => `<button class="chip" data-role="${r}">${r}</button>`).join('') + '</div>';
    const div = addMessage(chipsHtml, 'bot');
    div.querySelectorAll('.chip').forEach(btn=>{
      btn.addEventListener('click', ()=> handleRoleSelect(btn.dataset.role));
    });
  }

  function handleRoleSelect(role){
    addMessage(role, 'user');
    pendingRole = role;
    showTyping();
    setTimeout(()=>{
      removeTyping();
      showLocationChips(role);
    }, 500);
  }

  function showLocationChips(role){
    const chipsHtml = `Great — where are you looking for <b>${role}</b> jobs?<div class="loc-chips">` +
      locations.map(l => `<button class="chip" data-loc="${l}">${l}</button>`).join('') + '</div>';
    const div = addMessage(chipsHtml, 'bot');
    div.querySelectorAll('.chip').forEach(btn=>{
      btn.addEventListener('click', ()=> handleLocationSelect(role, btn.dataset.loc));
    });
  }

  function buildLinks(role, location){
    const loc = location === "Any location" ? "" : location;
    const q = encodeURIComponent(role);
    const l = encodeURIComponent(loc);
    return [
      {
        name: "LinkedIn", color:"#0a66c2", initial:"in",
        url: `https://www.linkedin.com/jobs/search/?keywords=${q}${loc ? `&location=${l}` : ''}`
      },
      {
        name: "Naukri", color:"#4a90d9", initial:"N",
        url: `https://www.naukri.com/${role.toLowerCase().replace(/\s+/g,'-')}-jobs${loc ? `-in-${loc.toLowerCase().replace(/\s+/g,'-')}` : ''}`
      },
      {
        name: "Indeed", color:"#2164f3", initial:"in",
        url: `https://www.indeed.com/jobs?q=${q}${loc ? `&l=${l}` : ''}`
      },
      {
        name: "Glassdoor", color:"#0caa41", initial:"G",
        url: `https://www.glassdoor.com/Job/jobs.htm?sc.keyword=${q}${loc ? `&locT=C&locKeyword=${l}` : ''}`
      }
    ];
  }

  function handleLocationSelect(role, location){
    addMessage(location, 'user');
    showTyping();
    setTimeout(()=>{
      removeTyping();
      const links = buildLinks(role, location);
      const cardsHtml = `Here are live search results for <b>${role}</b>${location !== "Any location" ? ` in <b>${location}</b>` : ''} — click any platform to view current openings:` +
        '<div class="results">' +
        links.map(l => `
          <div class="result-card">
            <div class="rc-left">
              <div class="rc-logo" style="background:${l.color}22; color:${l.color};">${l.initial}</div>
              <div>
                <div class="rc-name">${l.name}</div>
                <div class="rc-sub">${role}${location !== "Any location" ? ' · ' + location : ''}</div>
              </div>
            </div>
            <a class="rc-link" href="${l.url}" target="_blank" rel="noopener">Search →</a>
          </div>
        `).join('') +
        '</div>';
      addMessage(cardsHtml, 'bot');
      setTimeout(()=> addMessage("Want to search another role, or a different location for this one? Just type it below.", 'bot'), 600);
    }, 700);
  }

  function handleFreeText(text){
    addMessage(text, 'user');
    showTyping();
    setTimeout(()=>{
      removeTyping();
      // simple parse: look for "in <location>"
      const inMatch = text.match(/\bin\s+([a-zA-Z\s]+)$/i);
      let role = text, location = "Any location";
      if(inMatch){
        location = inMatch[1].trim();
        role = text.slice(0, inMatch.index).trim();
      }
      if(!role) role = text;
      const links = buildLinks(role, location);
      const cardsHtml = `Here are live search results for <b>${role}</b>${location !== "Any location" ? ` in <b>${location}</b>` : ''}:` +
        '<div class="results">' +
        links.map(l => `
          <div class="result-card">
            <div class="rc-left">
              <div class="rc-logo" style="background:${l.color}22; color:${l.color};">${l.initial}</div>
              <div>
                <div class="rc-name">${l.name}</div>
                <div class="rc-sub">${role}${location !== "Any location" ? ' · ' + location : ''}</div>
              </div>
            </div>
            <a class="rc-link" href="${l.url}" target="_blank" rel="noopener">Search →</a>
          </div>
        `).join('') +
        '</div>';
      addMessage(cardsHtml, 'bot');
    }, 700);
  }

  function handleSend(){
    const text = userInput.value.trim();
    if(!text) return;
    userInput.value = '';
    handleFreeText(text);
  }

  sendBtn.addEventListener('click', handleSend);
  userInput.addEventListener('keypress', (e)=>{ if(e.key === 'Enter') handleSend(); });

  // kick off with role chips
  setTimeout(showRoleChips, 400);
</script>

</body>
</html>
